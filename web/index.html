<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mun · มั่น</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased}
  html,body{margin:0;height:100%}
  .scr::-webkit-scrollbar{display:none}
  .scr{scrollbar-width:none}

  /* App shell: column (mobile) → row (desktop). Layout here so it can be responsive;
     the inline style on the element only carries the dynamic theme vars + bg. */
  .shell{position:relative;overflow:hidden;width:100%;height:100vh;display:flex;flex-direction:column}
  .main{order:1;flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}

  /* Nav: bottom tab bar on mobile. DOM order puts it first, order:2 drops it to the bottom. */
  .nav{order:2;flex:none;background:var(--card);display:flex;flex-direction:row;justify-content:space-around;align-items:center;height:84px;padding-top:13px;border-top:1px solid var(--line)}
  .navitem{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
  .navitem span{font-size:10.5px}
  .brand{display:none}

  /* Desktop: nav becomes a left sidebar; main panel fills the rest. */
  @media (min-width:760px){
    .shell{flex-direction:row}
    .nav{order:-1;flex-direction:column;justify-content:flex-start;align-items:stretch;height:100vh;width:232px;padding:26px 16px;gap:4px;border-top:none;border-right:1px solid var(--line)}
    .navitem{flex-direction:row;justify-content:flex-start;gap:14px;padding:12px 14px;border-radius:12px}
    .navitem span{font-size:14.5px}
    .navitem:hover{background:var(--card2)}
    .brand{display:block;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700;padding:6px 14px 22px}
    /* Content fills the panel but stays readable — centered, not stretched edge-to-edge. */
    .scr>div{max-width:1040px;margin:0 auto;width:100%}
  }
</style>
</head>
<body>

<!-- Login gate. Lives OUTSIDE the reactive template (engine has no input binding);
     wired by plain addEventListener in app.js. Shown until a Supabase session exists. -->
<div id="gate" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:#f4f1ea;font-family:'Anuphan',sans-serif;padding:24px">
  <div style="width:100%;max-width:360px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="display:inline-flex;width:54px;height:54px;border-radius:14px;background:#a8854a;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-size:30px;color:#fffdf8;font-weight:600">ม</div>
      <div style="font-size:24px;font-weight:700;color:#2a2723;margin-top:14px;letter-spacing:.5px">MUN · มั่น</div>
      <div id="gate-sub" style="font-size:13.5px;color:#8f897e;margin-top:4px">เข้าสู่ระบบเพื่อจัดการพอร์ตของคุณ</div>
    </div>
    <input id="gate-email" type="email" placeholder="อีเมล" autocomplete="email"
      style="width:100%;box-sizing:border-box;padding:14px 16px;border:1px solid #e8e2d5;border-radius:13px;background:#fffdf8;font-size:15px;color:#2a2723;margin-bottom:11px;font-family:inherit">
    <input id="gate-pw" type="password" placeholder="รหัสผ่าน" autocomplete="current-password"
      style="width:100%;box-sizing:border-box;padding:14px 16px;border:1px solid #e8e2d5;border-radius:13px;background:#fffdf8;font-size:15px;color:#2a2723;margin-bottom:11px;font-family:inherit">
    <div id="gate-err" style="display:none;font-size:13px;color:#c0664f;margin:0 2px 11px"></div>
    <button id="gate-submit" style="width:100%;padding:14px;border:none;border-radius:13px;background:#a8854a;color:#fffdf8;font-size:15.5px;font-weight:600;cursor:pointer;font-family:inherit">เข้าสู่ระบบ</button>
    <button id="gate-google" style="width:100%;padding:13px;border:1px solid #e8e2d5;border-radius:13px;background:#fffdf8;color:#2a2723;font-size:14.5px;font-weight:600;cursor:pointer;margin-top:11px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:9px">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.76h3.56c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.76c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"/></svg>
      ดำเนินการต่อด้วย Google
    </button>
    <div style="text-align:center;margin-top:18px;font-size:13.5px;color:#8f897e">
      <span id="gate-toggle-txt">ยังไม่มีบัญชี?</span>
      <span id="gate-toggle" style="color:#a8854a;font-weight:600;cursor:pointer;margin-left:4px">สมัครสมาชิก</span>
    </div>
  </div>
</div>

<div id="app" style="min-height:100vh;display:flex;justify-content:center;background:#e7e5df;font-family:'Anuphan',sans-serif"></div>

<!-- Add/edit transaction sheet. Plain DOM (outside the reactive template) so the 60s
     live-data re-render can't wipe half-typed inputs. Wired in app.js (wireTxnForm). -->
<div id="txnsheet" style="display:none;position:fixed;inset:0;z-index:60;align-items:flex-end;justify-content:center;font-family:'Anuphan',sans-serif">
  <div id="txnsheet-bg" style="position:absolute;inset:0;background:rgba(20,16,8,.42)"></div>
  <div style="position:relative;width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:24px 24px 0 0;padding:22px 20px 28px;max-height:92vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div id="txnsheet-title" style="font-size:18px;font-weight:700;color:var(--ink)">เพิ่มรายการ</div>
      <div id="txnsheet-close" style="cursor:pointer;font-size:20px;color:var(--sub);line-height:1;padding:4px 8px">✕</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="position:relative"><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">สินทรัพย์</div>
        <input id="tf-search" type="text" autocomplete="off" placeholder="ค้นหา เช่น AAPL, PTT, ทอง" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit">
        <input id="tf-sym" type="hidden">
        <div id="tf-results" style="display:none;position:absolute;left:0;right:0;top:100%;z-index:5;margin-top:4px;background:var(--card);border:1px solid var(--line);border-radius:12px;max-height:240px;overflow:auto;box-shadow:0 8px 24px rgba(0,0,0,.18)"></div></div>
      <div><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">ประเภท</div>
        <select id="tf-type" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit">
          <option value="buy">ซื้อ</option><option value="sell">ขาย</option><option value="dividend">ปันผล</option></select></div>
      <div style="display:flex;gap:12px">
        <div style="flex:1"><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">จำนวน</div>
          <input id="tf-qty" type="number" step="any" min="0" placeholder="0" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit"></div>
        <div style="flex:1"><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">ราคา (USD)</div>
          <input id="tf-price" type="number" step="any" min="0" placeholder="0.00" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit"></div>
      </div>
      <div style="display:flex;gap:12px">
        <div style="flex:1"><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">ค่าธรรมเนียม (USD)</div>
          <input id="tf-fee" type="number" step="any" min="0" value="0" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit"></div>
        <div style="flex:1"><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">วันที่</div>
          <input id="tf-date" type="date" style="width:100%;box-sizing:border-box;padding:11px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit"></div>
      </div>
      <div id="tf-err" style="display:none;font-size:13px;color:var(--down)"></div>
      <button id="tf-save" style="width:100%;padding:14px;border:none;border-radius:13px;background:var(--gold);color:var(--ongold);font-size:15.5px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px">บันทึก</button>
      <button id="tf-delete" style="display:none;width:100%;padding:12px;border:1px solid var(--line);border-radius:13px;background:transparent;color:var(--down);font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit">ลบรายการ</button>
    </div>
  </div>
</div>

<!-- Buy Planner (DCA) sheet. Plain DOM (outside the reactive template) like #txnsheet.
     Level rows are built/recomputed imperatively in app.js (wirePlanForm). -->
<div id="plansheet" style="display:none;position:fixed;inset:0;z-index:60;align-items:flex-end;justify-content:center;font-family:'Anuphan',sans-serif">
  <div id="plansheet-bg" style="position:absolute;inset:0;background:rgba(20,16,8,.42)"></div>
  <div style="position:relative;width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:24px 24px 0 0;padding:22px 20px 28px;max-height:92vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div id="plansheet-title" style="font-size:18px;font-weight:700;color:var(--ink)">แผนซื้อเฉลี่ย</div>
      <div id="plansheet-close" style="cursor:pointer;font-size:20px;color:var(--sub);line-height:1;padding:4px 8px">✕</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">สินทรัพย์</div>
        <input id="pf-sym" type="text" autocomplete="off" placeholder="เช่น AAPL, PTT, XAU" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit;text-transform:uppercase">
        <div id="pf-live" style="font-size:12px;color:var(--sub);margin-top:5px"></div></div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
          <span style="font-size:12.5px;color:var(--sub)">ระดับราคา (สูงสุด 7) — ราคา · จำนวน</span>
          <span id="pf-add" style="font-size:13px;font-weight:600;color:var(--gold);cursor:pointer">+ เพิ่มระดับ</span>
        </div>
        <div id="pf-levels" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>
      <div id="pf-summary" style="background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:14px 16px;font-size:13.5px"></div>
      <div id="pf-err" style="display:none;font-size:13px;color:var(--down)"></div>
      <button id="pf-save" style="width:100%;padding:14px;border:none;border-radius:13px;background:var(--gold);color:var(--ongold);font-size:15.5px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px">บันทึกแผน</button>
      <button id="pf-delete" style="display:none;width:100%;padding:12px;border:1px solid var(--line);border-radius:13px;background:transparent;color:var(--down);font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit">ลบแผน</button>
    </div>
  </div>
</div>

<!-- Price-alert sheet (Phase 6). Plain DOM like #txnsheet. Thresholds entered in the
     display currency, stored USD-canonical. Wired in app.js (wireAlertForm). -->
<div id="alertsheet" style="display:none;position:fixed;inset:0;z-index:60;align-items:flex-end;justify-content:center;font-family:'Anuphan',sans-serif">
  <div id="alertsheet-bg" style="position:absolute;inset:0;background:rgba(20,16,8,.42)"></div>
  <div style="position:relative;width:100%;max-width:460px;background:var(--card);border:1px solid var(--line);border-radius:24px 24px 0 0;padding:22px 20px 28px;max-height:92vh;overflow:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <div id="alertsheet-title" style="font-size:18px;font-weight:700;color:var(--ink)">แจ้งเตือนราคา</div>
      <div id="alertsheet-close" style="cursor:pointer;font-size:20px;color:var(--sub);line-height:1;padding:4px 8px">✕</div>
    </div>
    <div style="display:flex;gap:10px;align-items:flex-end">
      <div style="flex:none"><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">เงื่อนไข</div>
        <select id="af-op" style="box-sizing:border-box;padding:12px 12px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit">
          <option value="above">ขึ้นถึง</option><option value="below">ลงถึง</option></select></div>
      <div style="flex:1"><div style="font-size:12.5px;color:var(--sub);margin-bottom:5px">ราคา (<span id="af-cur">฿</span>)</div>
        <input id="af-price" type="number" step="any" min="0" placeholder="0.00" style="width:100%;box-sizing:border-box;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card2);color:var(--ink);font-size:15px;font-family:inherit"></div>
      <button id="af-add" style="flex:none;padding:12px 18px;border:none;border-radius:12px;background:var(--gold);color:var(--ongold);font-size:14.5px;font-weight:600;cursor:pointer;font-family:inherit">เพิ่ม</button>
    </div>
    <div id="af-err" style="display:none;font-size:13px;color:var(--down);margin-top:10px"></div>
    <div id="af-list" style="margin-top:16px"></div>
  </div>
</div>

<!-- Phone markup, lifted from the design prototype. Bound by the engine in app.js:
     {{ expr }} interpolation, <sc-if>, <sc-for as=>, onClick. -->
<template id="tpl">
  <!-- App shell. Layout via .shell CSS; inline style = dynamic theme vars + bg only. -->
  <div class="shell" style="{{ rootStyle }}">

    <!-- NAV: left sidebar on desktop, bottom tab bar on mobile -->
    <sc-if value="{{ showTabs }}">
    <div class="nav">
      <div class="brand"><img src="logo.png" alt="Mun" style="width:22px;height:22px;border-radius:6px;vertical-align:-5px;margin-right:8px">Mun · มั่น</div>
      <div class="navitem" onClick="{{ goOverview }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ c.overview }}" stroke-width="1.7"><rect x="3" y="3" width="8" height="8" rx="2.2"></rect><rect x="13" y="3" width="8" height="5" rx="2.2"></rect><rect x="13" y="10" width="8" height="11" rx="2.2"></rect><rect x="3" y="13" width="8" height="8" rx="2.2"></rect></svg><span style="color:{{ c.overview }}">ภาพรวม</span></div>
      <div class="navitem" onClick="{{ goWatch }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ c.watch }}" stroke-width="1.7" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4z"></path></svg><span style="color:{{ c.watch }}">เฝ้าดู</span></div>
      <div class="navitem" onClick="{{ goPlanner }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ c.planner }}" stroke-width="1.7" stroke-linecap="round"><path d="M4 7h10M4 12h16M4 17h7"></path><circle cx="18" cy="7" r="2"></circle><circle cx="13" cy="17" r="2"></circle></svg><span style="color:{{ c.planner }}">วางแผน</span></div>
      <div class="navitem" onClick="{{ goDividends }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ c.dividends }}" stroke-width="1.7"><circle cx="12" cy="12" r="8.5"></circle><path d="M12 7v10M9.5 9.5h4a1.6 1.6 0 010 3.2h-3a1.6 1.6 0 000 3.2h4" stroke-linecap="round"></path></svg><span style="color:{{ c.dividends }}">ปันผล</span></div>
      <div class="navitem" onClick="{{ goTransactions }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ c.transactions }}" stroke-width="1.7" stroke-linecap="round"><path d="M4 6h16M7 12h10M10 18h4"></path></svg><span style="color:{{ c.transactions }}">รายการ</span></div>
      <div class="navitem" onClick="{{ goAccount }}"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="{{ c.account }}" stroke-width="1.7" stroke-linecap="round"><circle cx="12" cy="8" r="3.6"></circle><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"></path></svg><span style="color:{{ c.account }}">บัญชี</span></div>
    </div>
    </sc-if>

    <!-- MAIN PANEL -->
    <div class="main">
    <div style="height:18px;flex:none"></div>

    <!-- CONTENT -->
    <div class="scr" style="flex:1;overflow-y:auto;overflow-x:hidden">

      <!-- ===== OVERVIEW ===== -->
      <sc-if value="{{ isOverview }}">
      <div>
        <div style="padding:6px 22px 4px;display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:13px;color:var(--sub)">สวัสดีตอนเช้า</div>
            <div style="font-size:19px;font-weight:600;color:var(--ink);letter-spacing:.2px">{{ userName }}</div>
          </div>
          <div onClick="{{ goAccount }}" style="width:42px;height:42px;border-radius:50%;background:var(--goldsoft);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:600;font-size:15px;border:1px solid var(--line);cursor:pointer">{{ userInitial }}</div>
        </div>
        <div style="margin:12px 16px 0;padding:22px 22px 18px;border-radius:24px;background:var(--card);border:1px solid var(--line)">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:13px;color:var(--sub);letter-spacing:.3px">มูลค่าพอร์ตรวม</div>
            <div style="display:flex;gap:4px;background:var(--card2);border-radius:8px;padding:3px">
              <span onClick="{{ setThb }}" style="font-size:11px;font-weight:600;cursor:pointer;padding:4px 9px;border-radius:6px;background:{{ thbBg }};color:{{ thbCol }}">฿</span>
              <span onClick="{{ setUsd }}" style="font-size:11px;font-weight:600;cursor:pointer;padding:4px 9px;border-radius:6px;background:{{ usdBg }};color:{{ usdCol }}">$</span>
            </div>
          </div>
          <div style="font-family:'Newsreader',serif;font-size:42px;font-weight:500;color:var(--ink);line-height:1.05;margin-top:8px;letter-spacing:-.5px">{{ totalMain }}</div>
          <div style="font-size:14px;color:var(--sub);margin-top:3px">{{ totalAlt }}</div>
          <div style="display:flex;align-items:center;gap:9px;margin-top:14px">
            <span style="display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:9px;background:{{ dayBg }};color:{{ dayCol }};font-size:13px;font-weight:600">{{ dayStr }}</span>
            <span style="font-size:12.5px;color:var(--sub)">วันนี้</span>
          </div>
          <svg width="100%" height="62" viewBox="0 0 320 62" preserveAspectRatio="none" style="margin-top:14px;display:block"><path d="{{ trendPath }}" fill="none" stroke="{{ trendColor }}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path><circle cx="{{ trendLastX }}" cy="{{ trendLastY }}" r="3.4" fill="{{ trendColor }}"></circle></svg>
          <div style="display:flex;gap:6px;margin-top:14px">
            <sc-for list="{{ ranges }}" as="r">
              <span onClick="{{ r.onClick }}" style="font-size:12px;font-weight:{{ r.weight }};cursor:pointer;border-radius:8px;padding:5px 0;width:38px;text-align:center;background:{{ r.bg }};color:{{ r.col }}">{{ r.label }}</span>
            </sc-for>
          </div>
        </div>
        <!-- Phase 3: market overview strip — live tickers (gold/crypto/index/Thai) -->
        <div style="margin:18px 0 0;padding:0 16px;display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch">
          <sc-for list="{{ marketStrip }}" as="m">
            <div onClick="{{ m.onOpen }}" style="flex:none;min-width:108px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 13px;cursor:pointer">
              <div style="font-size:12px;color:var(--sub);font-weight:600">{{ m.name }}</div>
              <div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:3px">{{ m.priceStr }}</div>
              <div style="font-size:12px;font-weight:600;color:{{ m.pctColor }};margin-top:1px">{{ m.pct }}</div>
            </div>
          </sc-for>
        </div>
        <div style="margin:18px 16px 0">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px">
            <span style="font-size:14px;font-weight:600;color:var(--ink)">สัดส่วนการลงทุน</span>
            <span style="font-size:12.5px;color:var(--gold);font-weight:600">ปรับสมดุล</span>
          </div>
          <div style="display:flex;height:11px;border-radius:6px;overflow:hidden;gap:2px">
            <sc-for list="{{ alloc }}" as="a">
              <span style="width:{{ a.pct }}%;background:{{ a.color }}"></span>
            </sc-for>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px 18px;margin-top:13px">
            <sc-for list="{{ alloc }}" as="a">
              <div style="display:flex;align-items:center;gap:7px"><span style="width:8px;height:8px;border-radius:2px;background:{{ a.color }}"></span><span style="font-size:12.5px;color:var(--sub);flex:1">{{ a.label }}</span><span style="font-size:12.5px;font-weight:600;color:var(--ink)">{{ a.pctLabel }}</span></div>
            </sc-for>
          </div>
        </div>
        <!-- Phase 7: per-asset concentration + over-cap warning -->
        <sc-if value="{{ hasConc }}">
        <div style="margin:18px 16px 0">
          <div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:11px">การกระจุกตัวของสินทรัพย์</div>
          <sc-if value="{{ hasOverCap }}">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:11px;padding:10px 13px;border-radius:12px;background:color-mix(in oklab,var(--down) 12%,transparent);border:1px solid color-mix(in oklab,var(--down) 35%,transparent)">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--down)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path><path d="M12 9v4M12 17h.01"></path></svg>
            <span style="font-size:12.5px;color:var(--down);font-weight:600">{{ overCapMsg }}</span>
          </div>
          </sc-if>
          <div style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:6px 16px">

              <div style="padding:11px 0;border-bottom:1px solid var(--line)">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
                  <span style="font-size:13.5px;font-weight:600;color:var(--ink)">{{ ca.sym }} <span style="color:var(--sub);font-weight:400">· {{ ca.valStr }}</span></span>
                  <span style="font-size:13px;font-weight:700;color:{{ ca.barColor }}">{{ ca.pctLabel }}</span>
                </div>
                <div style="height:6px;border-radius:3px;background:var(--card2);overflow:hidden"><span style="display:block;height:100%;width:{{ ca.barPct }}%;background:{{ ca.barColor }}"></span></div>
              </div>
            </sc-for>
          </div>
        </div>
        </sc-if>
        <div style="margin:20px 16px 28px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
            <span style="font-size:14px;font-weight:600;color:var(--ink)">การถือครอง</span>
            <span onClick="{{ goWatch }}" style="font-size:12.5px;color:var(--gold);font-weight:600;cursor:pointer">ดูทั้งหมด</span>
          </div>
          <div style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:4px 16px">
            <sc-for list="{{ holdings }}" as="h">
              <div onClick="{{ h.onOpen }}" style="display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer">
                <div style="width:40px;height:40px;border-radius:12px;background:var(--goldsoft);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:700;font-size:14px">{{ h.logo }}</div>
                <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--ink)">{{ h.name }}</div><div style="font-size:12.5px;color:var(--sub)">{{ h.holdSub }}</div></div>
                <div style="text-align:right"><div style="font-size:15px;font-weight:600;color:var(--ink)">{{ h.valStr }}</div><div style="font-size:12.5px;font-weight:600;color:{{ h.pctColor }}">{{ h.pct }}</div></div>
              </div>
            </sc-for>
          </div>
        </div>
        <!-- Phase 3: market news. Thai brief = the main idea inline (translated proxy-side);
             source is a small credit link, not a forced click-through. Hidden until loaded. -->
        <sc-if value="{{ hasNews }}">
        <div style="margin:4px 16px 28px">
          <div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:9px">ข่าวตลาด</div>
          <div style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:4px 16px">
            <sc-for list="{{ newsItems }}" as="n">
              <div style="padding:13px 0;border-bottom:1px solid var(--line)">
                <div style="font-size:14px;font-weight:600;color:var(--ink);line-height:1.4">{{ n.headline }}</div>
                <sc-if value="{{ n.hasSummary }}">
                  <div style="font-size:13px;color:var(--sub);margin-top:5px;line-height:1.5">{{ n.summary }}</div>
                </sc-if>
                <a href="{{ n.url }}" target="_blank" rel="noopener" style="display:inline-block;font-size:11px;color:var(--faint);margin-top:6px;text-decoration:none">ที่มา: {{ n.source }} ↗</a>
              </div>
            </sc-for>
          </div>
        </div>
        </sc-if>
      </div>
      </sc-if>

      <!-- ===== DETAIL ===== -->
      <sc-if value="{{ isDetail }}">
      <div>
        <div style="padding:6px 20px 4px;display:flex;align-items:center;justify-content:space-between">
          <div onClick="{{ back }}" style="cursor:pointer;width:36px;height:36px;display:flex;align-items:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"></path></svg></div>
          <div style="text-align:center"><div style="font-size:16px;font-weight:700;color:var(--ink);letter-spacing:.5px">{{ d.sym }}</div><div style="font-size:11.5px;color:var(--sub)">{{ d.name2 }}</div></div>
          <div style="display:flex;align-items:center;gap:14px;justify-content:flex-end">
            <div onClick="{{ openAlert }}" style="cursor:pointer;position:relative;display:flex"><svg width="22" height="22" viewBox="0 0 24 24" fill="{{ d.bellFill }}" stroke="var(--gold)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.7 21a2 2 0 01-3.4 0"></path></svg><sc-if value="{{ d.hasAlert }}"><span style="position:absolute;top:-3px;right:-4px;min-width:14px;height:14px;padding:0 3px;border-radius:7px;background:var(--gold);color:var(--ongold);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">{{ d.alertCount }}</span></sc-if></div>
            <div onClick="{{ toggleStar }}" style="cursor:pointer;display:flex"><svg width="23" height="23" viewBox="0 0 24 24" fill="{{ d.starFill }}" stroke="var(--gold)" stroke-width="1.5" stroke-linejoin="round"><path d="M12 3l2.5 5.5 6 .6-4.5 4 1.3 5.9L12 21l-5.3 1 1.3-5.9-4.5-4 6-.6z"></path></svg></div>
          </div>
        </div>
        <div style="padding:14px 24px 0">
          <div style="font-size:12.5px;color:var(--sub)">{{ d.subline }}</div>
          <div style="font-family:'Newsreader',serif;font-size:44px;font-weight:500;color:var(--ink);line-height:1.05;margin-top:4px;letter-spacing:-.5px">{{ d.priceStr }}</div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
            <span style="display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:9px;background:{{ d.dayBg }};color:{{ d.dayCol }};font-size:13px;font-weight:600">{{ d.dayStr }}</span>
            <span style="font-size:13px;color:var(--sub)">{{ d.priceAlt }}</span>
          </div>
        </div>
        <div style="padding:18px 16px 0">
          <svg width="100%" height="148" viewBox="0 0 358 148" style="display:block">
            <sc-for list="{{ d.candles }}" as="k">
              <line x1="{{ k.wx }}" y1="{{ k.wy1 }}" x2="{{ k.wx }}" y2="{{ k.wy2 }}" stroke="{{ k.color }}" stroke-width="1"></line>
              <rect x="{{ k.bx }}" y="{{ k.by }}" width="{{ k.bw }}" height="{{ k.bh }}" fill="{{ k.color }}"></rect>
            </sc-for>
          </svg>
          <div style="display:flex;gap:6px;margin-top:10px;padding:0 6px">
            <sc-for list="{{ ranges }}" as="r">
              <span onClick="{{ r.onClick }}" style="font-size:12px;font-weight:{{ r.weight }};cursor:pointer;border-radius:8px;padding:5px 0;flex:1;text-align:center;background:{{ r.bg }};color:{{ r.col }}">{{ r.label }}</span>
            </sc-for>
          </div>
        </div>
        <div style="margin:18px 16px 0;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px 12px">
          <div><div style="font-size:11.5px;color:var(--sub)">เปิด</div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:2px">{{ d.open }}</div></div>
          <div><div style="font-size:11.5px;color:var(--sub)">สูงสุด</div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:2px">{{ d.high }}</div></div>
          <div><div style="font-size:11.5px;color:var(--sub)">ต่ำสุด</div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:2px">{{ d.low }}</div></div>
          <div><div style="font-size:11.5px;color:var(--sub)">มูลค่าตลาด</div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:2px">{{ d.mcap }}</div></div>
          <div><div style="font-size:11.5px;color:var(--sub)">ปริมาณ</div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:2px">{{ d.vol }}</div></div>
          <div><div style="font-size:11.5px;color:var(--sub)">P/E</div><div style="font-size:15px;font-weight:600;color:var(--ink);margin-top:2px">{{ d.pe }}</div></div>
        </div>
        <sc-if value="{{ d.held }}">
        <div style="margin:14px 16px 28px;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:16px 18px">
          <div style="font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px">การถือครองของคุณ</div>
          <div style="display:flex;justify-content:space-between;margin-bottom:9px"><span style="font-size:13px;color:var(--sub)">จำนวน</span><span style="font-size:13.5px;font-weight:600;color:var(--ink)">{{ d.posQty }}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:9px"><span style="font-size:13px;color:var(--sub)">ต้นทุนเฉลี่ย</span><span style="font-size:13.5px;font-weight:600;color:var(--ink)">{{ d.posAvg }}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="font-size:13px;color:var(--sub)">กำไรที่ยังไม่รับรู้</span><span style="font-size:13.5px;font-weight:600;color:{{ d.gainCol }}">{{ d.posGain }}</span></div>
          <sc-if value="{{ d.hasRealized }}">
          <div style="display:flex;justify-content:space-between;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)"><span style="font-size:13px;color:var(--sub)">กำไรที่รับรู้แล้ว (FIFO)</span><span style="font-size:13.5px;font-weight:600;color:{{ d.realizedCol }}">{{ d.realizedStr }}</span></div>
          </sc-if>
        </div>
        </sc-if>
        <sc-if value="{{ d.notHeld }}">

          <div style="font-size:13.5px;color:var(--sub)">คุณยังไม่ได้ถือครอง {{ d.sym }}</div>
          <div style="font-size:12.5px;color:var(--faint);margin-top:4px">แตะ “ซื้อ” เพื่อเริ่มลงทุน</div>
        </div>
        </sc-if>
      </div>
      </sc-if>

      <!-- ===== WATCHLIST ===== -->
      <sc-if value="{{ isWatch }}">
      <div>
        <div style="padding:6px 22px 4px;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.3px">เฝ้าดู</div>
          <div style="width:38px;height:38px;border-radius:50%;background:var(--goldsoft);display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg></div>
        </div>
        <div style="display:flex;gap:7px;padding:12px 18px 0;overflow:hidden">
          <sc-for list="{{ watchTabs }}" as="f">
            <span onClick="{{ f.onClick }}" style="font-size:13px;font-weight:{{ f.weight }};white-space:nowrap;border-radius:10px;padding:8px 15px;background:{{ f.bg }};color:{{ f.col }};border:1px solid {{ f.bd }}">{{ f.label }}</span>

        <div style="display:flex;gap:11px;padding:16px 18px 0">
          <div style="flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 13px 11px">
            <div style="font-size:12px;color:var(--sub);font-weight:600">SET</div>
            <div style="font-size:15px;font-weight:700;color:var(--ink);margin-top:3px">1,308.22</div>
            <svg width="100%" height="20" viewBox="0 0 70 20" preserveAspectRatio="none" style="margin:5px 0 3px;display:block"><path d="M0,6 C12,4 18,12 30,11 C44,10 50,15 70,16" fill="none" stroke="var(--down)" stroke-width="1.8"></path></svg>
            <div style="font-size:12px;font-weight:600;color:var(--down)">−0.32%</div>
          </div>
          <div style="flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 13px 11px">
            <div style="font-size:12px;color:var(--sub);font-weight:600">S&P 500</div>
            <div style="font-size:15px;font-weight:700;color:var(--ink);margin-top:3px">5,521.4</div>
            <svg width="100%" height="20" viewBox="0 0 70 20" preserveAspectRatio="none" style="margin:5px 0 3px;display:block"><path d="M0,15 C14,14 20,8 34,9 C48,10 54,4 70,3" fill="none" stroke="var(--up)" stroke-width="1.8"></path></svg>
            <div style="font-size:12px;font-weight:600;color:var(--up)">+0.41%</div>
          </div>
          <div style="flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 13px 11px">
            <div style="font-size:12px;color:var(--sub);font-weight:600">BTC</div>
            <div style="font-size:15px;font-weight:700;color:var(--ink);margin-top:3px">฿2.48M</div>
            <svg width="100%" height="20" viewBox="0 0 70 20" preserveAspectRatio="none" style="margin:5px 0 3px;display:block"><path d="M0,4 C14,6 20,3 34,8 C48,13 54,11 70,16" fill="none" stroke="var(--down)" stroke-width="1.8"></path></svg>
            <div style="font-size:12px;font-weight:600;color:var(--down)">−2.10%</div>
          </div>
        </div>
        <div style="margin:16px 16px 28px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:2px 16px">
          <sc-for list="{{ watchRows }}" as="w">
            <div onClick="{{ w.onOpen }}" style="display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer">
              <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--ink)">{{ w.sym }}</div><div style="font-size:12px;color:var(--sub)">{{ w.name2 }}</div></div>
              <svg width="56" height="24" viewBox="0 0 56 24" preserveAspectRatio="none"><path d="{{ w.spark }}" fill="none" stroke="{{ w.pctColor }}" stroke-width="1.8"></path></svg>
              <div style="text-align:right;min-width:74px"><div style="font-size:14.5px;font-weight:600;color:var(--ink)">{{ w.priceStr }}</div><div style="font-size:12px;font-weight:600;color:{{ w.pctColor }}">{{ w.pct }}</div></div>
            </div>
          </sc-for>
        </div>
      </div>
      </sc-if>

      <!-- ===== BUY PLANNER (DCA) — Phase 4 ===== -->
      <sc-if value="{{ isPlanner }}">
      <div>
        <div style="padding:6px 22px 4px;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.3px">วางแผนซื้อ</div>
          <div onClick="{{ newPlan }}" style="width:38px;height:38px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ongold)" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg></div>

              <div style="text-align:right"><div style="font-size:11.5px;color:var(--sub)">ต้นทุนเฉลี่ย</div><div style="font-size:16px;font-weight:700;color:var(--gold);margin-top:1px">{{ p.avgStr }}</div></div>

              <sc-if value="{{ p.hasDelta }}"><span style="font-size:12.5px;font-weight:600;color:{{ p.deltaCol }}">{{ p.deltaStr }}</span></sc-if>

          </div>
        </sc-for>

          <div style="font-size:14px;color:var(--sub)">ยังไม่มีแผนซื้อ</div>
          <div style="font-size:12.5px;color:var(--faint);margin-top:5px">แตะ + ด้านบนเพื่อสร้างแผนซื้อเฉลี่ยต้นทุน</div>
        </div>
        </sc-if>
        <div style="height:28px"></div>
      </div>
      </sc-if>

      <!-- ===== DIVIDENDS (static showcase, parity with iOS) ===== -->
      <sc-if value="{{ isDividends }}">
      <div>
        <div style="padding:6px 22px 4px"><div style="font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.3px">เงินปันผล</div></div>
        <div style="margin:12px 16px 0;padding:20px 22px;border-radius:24px;background:var(--card);border:1px solid var(--line)">
          <div style="font-size:13px;color:var(--sub)">รับแล้วในปีนี้</div>
          <div style="font-family:'Newsreader',serif;font-size:38px;font-weight:500;color:var(--ink);line-height:1.05;margin-top:6px;letter-spacing:-.5px">{{ divReceived }}</div>
          <div style="display:flex;gap:24px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)">
            <div><div style="font-size:12px;color:var(--sub)">คาดทั้งปี</div><div style="font-size:16px;font-weight:600;color:var(--ink);margin-top:3px">{{ divAnnual }}</div></div>
            <div><div style="font-size:12px;color:var(--sub)">อัตราผลตอบแทน</div><div style="font-size:16px;font-weight:600;color:var(--gold);margin-top:3px">{{ divYield }}</div></div>
            <div><div style="font-size:12px;color:var(--sub)">รับ/เดือน</div><div style="font-size:16px;font-weight:600;color:var(--ink);margin-top:3px">{{ divMonthly }}</div></div>
          </div>
        </div>
        <div style="margin:18px 16px 28px">
          <div style="font-size:14px;font-weight:600;color:var(--ink);margin-bottom:9px">ปันผลของหุ้นที่ถือ</div>
          <div style="font-size:12px;color:var(--faint);margin-bottom:9px">วันจ่ายถัดไปเป็นค่าประมาณจากรอบการจ่ายที่ผ่านมา · แตะเพื่อบันทึกรายการปันผล</div>
          <div style="background:var(--card);border:1px solid var(--line);border-radius:20px;padding:2px 16px">
            <sc-for list="{{ divRows }}" as="dv">
              <div onClick="{{ dv.onSuggest }}" style="display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--line);cursor:pointer">
                <div style="width:40px;height:40px;border-radius:12px;background:var(--goldsoft);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:700;font-size:14px">{{ dv.logo }}</div>
                <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--ink)">{{ dv.name }}</div><div style="font-size:12.5px;color:var(--sub)">{{ dv.xdSub }}</div></div>
                <div style="text-align:right"><div style="font-size:15px;font-weight:600;color:var(--up)">{{ dv.payout }}</div><div style="font-size:12px;color:var(--sub)">{{ dv.nextStr }}</div></div>
              </div>
            </sc-for>
          </div>
        </div>
        <sc-if value="{{ divEmpty }}">
        <div style="margin:6px 16px 28px;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:26px 18px;text-align:center">
          <div style="font-size:14px;color:var(--sub)">ยังไม่มีข้อมูลปันผล</div>
          <div style="font-size:12.5px;color:var(--faint);margin-top:5px">ถือหุ้นหรือกองทุนที่จ่ายปันผลเพื่อดูปฏิทินและผลตอบแทน</div>
        </div>
        </sc-if>
      </div>
      </sc-if>

      <!-- ===== TRANSACTIONS ===== -->
      <sc-if value="{{ isTransactions }}">
      <div>
        <div style="padding:6px 22px 4px;display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.3px">รายการซื้อขาย</div>
          <div style="display:flex;gap:8px;align-items:center">
            <span onClick="{{ exportTax }}" style="font-size:12.5px;font-weight:600;color:var(--gold);cursor:pointer;padding:8px 12px;border:1px solid var(--line);border-radius:10px">ภาษี</span>
            <span onClick="{{ exportCSV }}" style="font-size:12.5px;font-weight:600;color:var(--gold);cursor:pointer;padding:8px 12px;border:1px solid var(--line);border-radius:10px">CSV</span>
            <div onClick="{{ addTxn }}" style="width:38px;height:38px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ongold)" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg></div>
          </div>
        </div>
        <sc-if value="{{ hasRealized }}">
        <div style="margin:14px 16px 0;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:13px;color:var(--sub)">กำไร/ขาดทุนที่รับรู้แล้ว (FIFO)</span>
          <span style="font-size:16px;font-weight:700;color:{{ realizedCol }}">{{ realizedStr }}</span>
        </div>
        </sc-if>
        <div style="display:flex;gap:7px;padding:12px 18px 0">
          <sc-for list="{{ txnTabs }}" as="f">
            <span onClick="{{ f.onClick }}" style="font-size:13px;font-weight:{{ f.weight }};border-radius:10px;padding:8px 15px;background:{{ f.bg }};color:{{ f.col }};border:1px solid {{ f.bd }}">{{ f.label }}</span>
          </sc-for>
        </div>
        <sc-for list="{{ txnGroups }}" as="g">
          <div>
            <div style="padding:18px 22px 8px;font-size:12.5px;font-weight:600;color:var(--sub)">{{ g.date }}</div>
            <div style="margin:0 16px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:2px 16px">
              <sc-for list="{{ g.items }}" as="t">
                <div onClick="{{ t.onEdit }}" style="display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid {{ t.bb }};cursor:pointer">
                  <div style="width:40px;height:40px;border-radius:12px;background:{{ t.iconBg }};display:flex;align-items:center;justify-content:center">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{{ t.iconStroke }}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="{{ t.iconPath }}"></path></svg>
                  </div>
                  <div style="flex:1"><div style="font-size:15px;font-weight:600;color:var(--ink)">{{ t.title }}</div><div style="font-size:12.5px;color:var(--sub)">{{ t.sub }}</div></div>
                  <div style="text-align:right"><div style="font-size:15px;font-weight:600;color:{{ t.amtCol }}">{{ t.amt }}</div><div style="font-size:12px;color:var(--sub)">{{ t.time }}</div></div>
                </div>
              </sc-for>
            </div>
          </div>
        </sc-for>
        <sc-if value="{{ txnEmpty }}">
        <div style="margin:18px 16px 0;background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:26px 18px;text-align:center">
          <div style="font-size:14px;color:var(--sub)">ยังไม่มีรายการซื้อขาย</div>
          <div style="font-size:12.5px;color:var(--faint);margin-top:5px">แตะ + ด้านบนเพื่อเพิ่มรายการ หรือซื้อจากหน้าหุ้น</div>
        </div>
        </sc-if>
        <div style="height:28px"></div>
      </div>
      </sc-if>

      <!-- ===== ACCOUNT ===== -->
      <sc-if value="{{ isAccount }}">
      <div>
        <div style="padding:6px 22px 4px"><div style="font-size:26px;font-weight:700;color:var(--ink);letter-spacing:-.3px">บัญชี</div></div>
        <div style="margin:14px 16px 0;display:flex;align-items:center;gap:15px;padding:18px 20px;border-radius:24px;background:var(--card);border:1px solid var(--line)">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--goldsoft);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:600;font-size:20px;border:1px solid var(--line)">{{ userInitial }}</div>
          <div style="flex:1"><div style="font-size:18px;font-weight:600;color:var(--ink)">{{ userName }}</div><div style="font-size:13px;color:var(--sub)">{{ userEmail }}</div></div>
          <span style="font-size:12px;font-weight:700;color:var(--gold);background:var(--goldsoft);border:1px solid var(--line);padding:5px 11px;border-radius:9px">{{ tierLabel }}</span>
        </div>
        <!-- Phase 8: freemium tier card -->
        <sc-if value="{{ isPro }}">
        <div style="margin:14px 16px 0;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px 18px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:15px;font-weight:700;color:var(--ink)">Mun Pro</div><div style="font-size:12.5px;color:var(--sub);margin-top:2px">สินทรัพย์ แผน และการแจ้งเตือนไม่จำกัด</div></div>
            <span onClick="{{ downgradeMock }}" style="font-size:12.5px;font-weight:600;color:var(--down);cursor:pointer;padding:8px 12px;border:1px solid var(--line);border-radius:10px">ยกเลิก</span>
          </div>
        </div>
        </sc-if>
        <sc-if value="{{ isFree }}">
        <div style="margin:14px 16px 0;background:linear-gradient(135deg,var(--goldsoft),var(--card));border:1px solid var(--gold);border-radius:20px;padding:18px">
          <div style="font-size:16px;font-weight:700;color:var(--ink)">อัปเกรดเป็น Mun Pro</div>
          <div style="font-size:12.5px;color:var(--sub);margin-top:4px;line-height:1.5">แผนฟรี: สูงสุด 5 สินทรัพย์ · 1 แผนซื้อ · 3 การแจ้งเตือน<br>Pro: ไม่จำกัดทั้งหมด + การวิเคราะห์ขั้นสูง</div>
          <div onClick="{{ upgradeMock }}" style="margin-top:14px;height:46px;border-radius:13px;background:var(--gold);color:var(--ongold);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;cursor:pointer">อัปเกรด (จำลอง)</div>
        </div>
        </sc-if>
        <div style="margin:18px 16px 0;font-size:12.5px;font-weight:600;color:var(--sub);padding-left:6px">การแสดงผล</div>
        <div style="margin:9px 16px 0;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:2px 18px">
          <div style="display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" stroke-linejoin="round"></path></svg>
            <span style="flex:1;font-size:15px;color:var(--ink)">โหมดมืด</span>
            <div onClick="{{ toggleDark }}" style="{{ darkTrack }}"><div style="{{ darkKnob }}"></div></div>
          </div>
          <div style="display:flex;align-items:center;gap:14px;padding:15px 0">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v10M9.5 9.5h4a1.6 1.6 0 010 3.2h-3a1.6 1.6 0 000 3.2h4" stroke-linecap="round"></path></svg>
            <span style="flex:1;font-size:15px;color:var(--ink)">สกุลเงินหลัก</span>
            <div style="display:flex;gap:4px;background:var(--card2);border-radius:9px;padding:3px">
              <span onClick="{{ setThb }}" style="font-size:13px;font-weight:600;cursor:pointer;padding:4px 12px;border-radius:6px;background:{{ thbBg }};color:{{ thbCol }}">฿ THB</span>
              <span onClick="{{ setUsd }}" style="font-size:13px;font-weight:600;cursor:pointer;padding:4px 12px;border-radius:6px;background:{{ usdBg }};color:{{ usdCol }}">$ USD</span>
            </div>
          </div>
        </div>
        <div style="margin:18px 16px 0;font-size:12.5px;font-weight:600;color:var(--sub);padding-left:6px">ทั่วไป</div>
        <div style="margin:9px 16px 28px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:2px 18px">
          <div style="display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.7 21a2 2 0 01-3.4 0"></path></svg>
            <span style="flex:1;font-size:15px;color:var(--ink)">การแจ้งเตือนราคา</span>
            <div onClick="{{ toggleNotif }}" style="{{ notifTrack }}"><div style="{{ notifKnob }}"></div></div>
          </div>
          <div style="display:flex;align-items:center;gap:14px;padding:15px 0;border-bottom:1px solid var(--line)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.8" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 8-8 10-4.5-2-8-5-8-10V6z"></path></svg>
            <span style="flex:1;font-size:15px;color:var(--ink)">ความปลอดภัย</span>
            <svg width="8" height="14" viewBox="0 0 8 14" fill="none" stroke="var(--faint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l6 6-6 6"></path></svg>
          </div>
          <div onClick="{{ signOut }}" style="display:flex;align-items:center;gap:14px;padding:15px 0;cursor:pointer">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--down)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><path d="M16 17l5-5-5-5M21 12H9"></path></svg>
            <span style="flex:1;font-size:15px;color:var(--down)">ออกจากระบบ</span>
          </div>
        </div>
        <div style="text-align:center;padding:6px 16px 28px;font-size:12px;color:var(--faint)">© 2026 Mun · มั่น · สงวนลิขสิทธิ์</div>
      </div>
      </sc-if>

    </div>

    <!-- ACTION BAR (detail) — stays at the bottom of the main panel -->
    <sc-if value="{{ isDetail }}">
    <div style="height:96px;background:var(--card);border-top:1px solid var(--line);display:flex;gap:12px;padding:14px 18px 0;flex:none">
      <div onClick="{{ openSell }}" style="flex:1;height:52px;border-radius:15px;border:1.5px solid var(--down);color:var(--down);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer">ขาย</div>
      <div onClick="{{ openBuy }}" style="flex:1;height:52px;border-radius:15px;background:var(--gold);color:var(--ongold);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;cursor:pointer">ซื้อ</div>
    </div>
    </sc-if>
    </div><!-- /.main -->

    <!-- ORDER TICKET SHEET -->
    <sc-if value="{{ showTicket }}">
    <div style="position:absolute;inset:0;z-index:20">
      <div onClick="{{ closeTicket }}" style="position:absolute;inset:0;background:rgba(20,16,8,.42)"></div>
      <div style="position:absolute;left:0;right:0;bottom:0;background:var(--card);border-radius:28px 28px 0 0;border-top:1px solid var(--line);padding:10px 22px 30px">
        <div style="width:38px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 16px"></div>
        <div style="display:flex;align-items:center;gap:13px;margin-bottom:20px">
          <div style="width:44px;height:44px;border-radius:13px;background:var(--goldsoft);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:700;font-size:15px">{{ tk.logo }}</div>
          <div style="flex:1"><div style="font-size:17px;font-weight:700;color:var(--ink)">{{ tk.title }}</div><div style="font-size:12.5px;color:var(--sub)">{{ tk.sub }}</div></div>
          <div style="text-align:right"><div style="font-size:16px;font-weight:600;color:var(--ink)">{{ tk.priceStr }}</div><div style="font-size:12px;color:{{ tk.pctColor }};font-weight:600">{{ tk.pct }}</div></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:14px 18px;margin-bottom:14px">
          <span style="font-size:14px;color:var(--sub)">จำนวน</span>
          <div style="display:flex;align-items:center;gap:18px">
            <div onClick="{{ ticketDec }}" style="width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="16" height="16" viewBox="0 0 24 24" stroke="var(--ink)" stroke-width="2.4" stroke-linecap="round"><path d="M5 12h14"></path></svg></div>
            <span style="font-size:20px;font-weight:700;color:var(--ink);min-width:42px;text-align:center">{{ tk.qty }}</span>
            <div onClick="{{ ticketInc }}" style="width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer"><svg width="16" height="16" viewBox="0 0 24 24" stroke="var(--ink)" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"></path></svg></div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 4px 18px">
          <span style="font-size:14px;color:var(--sub)">ยอดรวมโดยประมาณ</span>
          <span style="font-family:'Newsreader',serif;font-size:24px;font-weight:500;color:var(--ink)">{{ tk.total }}</span>
        </div>
        <div onClick="{{ confirmTicket }}" style="height:54px;border-radius:16px;background:{{ tk.btnBg }};color:{{ tk.btnCol }};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer">{{ tk.btnLabel }}</div>
      </div>
    </div>
    </sc-if>

    <!-- TOAST -->
    <sc-if value="{{ showToast }}">
    <div style="position:absolute;left:50%;bottom:108px;transform:translateX(-50%);z-index:30;background:var(--ink);color:var(--page);font-size:13.5px;font-weight:600;padding:11px 20px;border-radius:13px;box-shadow:0 10px 30px -8px rgba(0,0,0,.5);white-space:nowrap">{{ toastMsg }}</div>
    </sc-if>

  </div>
</template>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="marketapi.js"></script>
<script src="app.js"></script>
</body>
</html>
